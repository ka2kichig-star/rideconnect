<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RideConnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  :root{--bg:#0e0e0e;--surface:#1a1a1a;--card:#222;--orange:#ff6a00;--white:#f0ede8;--gray:#888;--green:#39ff6a;--red:#ff3b3b;--blue:#4da6ff;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--white);font-family:'Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;}
  .screen{display:none;flex-direction:column;height:100%;}
  .screen.active{display:flex;}

  #setupScreen{background:linear-gradient(160deg,#1a0a00,#0e0e0e);align-items:center;justify-content:center;padding:32px 24px;gap:24px;}
  .setup-logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;color:var(--orange);line-height:1;text-align:center;}
  .setup-logo span{color:var(--white);}
  .setup-sub{font-size:13px;color:var(--gray);text-align:center;margin-top:-16px;}
  .setup-form{width:100%;display:flex;flex-direction:column;gap:14px;}
  .setup-form label{font-size:11px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;display:block;}
  .setup-form input{width:100%;background:#2a2a2a;border:1px solid #333;border-radius:10px;padding:14px 16px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:16px;outline:none;transition:border-color .2s;}
  .setup-form input:focus{border-color:var(--orange);}
  .btn-start{width:100%;background:var(--orange);color:#000;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;border:none;border-radius:12px;padding:16px;cursor:pointer;margin-top:8px;}
  .btn-start:active{transform:scale(.97);opacity:.9;}

  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;background:var(--bg);border-bottom:1px solid #2a2a2a;flex-shrink:0;z-index:100;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--orange);}
  .logo span{color:var(--white);}
  .header-right{display:flex;align-items:center;gap:12px;}
  .nearby-badge{font-size:11px;color:var(--gray);text-align:right;line-height:1.3;}
  .nearby-badge strong{display:block;font-size:20px;font-family:'Bebas Neue',sans-serif;color:var(--orange);}
  .chat-btn{width:40px;height:40px;border-radius:50%;background:#2a2a2a;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;}
  .chat-badge{position:absolute;top:0;right:0;width:16px;height:16px;background:var(--red);border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;}
  .chat-badge.show{display:flex;}

  #map{flex:1;min-height:0;z-index:1;}
  .leaflet-control-attribution{font-size:9px!important;}

  .bottom-panel{flex-shrink:0;background:var(--surface);border-top:1px solid #2f2f2f;padding:12px 16px 16px;z-index:100;}
  .status-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .status-label .title{font-size:11px;color:var(--gray);margin-bottom:2px;}
  .status-label .value{font-size:15px;font-weight:900;color:var(--red);}
  .status-label .value.active{color:var(--green);}
  .toggle-btn{width:64px;height:34px;border-radius:17px;border:none;background:#333;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0;}
  .toggle-btn.on{background:var(--orange);}
  .toggle-btn::after{content:'';position:absolute;width:26px;height:26px;border-radius:50%;background:var(--white);top:4px;left:4px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .toggle-btn.on::after{transform:translateX(30px);}
  .riders-title{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
  .riders-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
  .riders-scroll::-webkit-scrollbar{display:none;}
  .rider-card{flex-shrink:0;background:var(--card);border-radius:10px;padding:10px 12px;min-width:120px;border:1px solid #2f2f2f;cursor:pointer;position:relative;}
  .rider-card:active{transform:scale(.97);border-color:var(--orange);}
  .rider-dot{width:7px;height:7px;border-radius:50%;background:var(--green);position:absolute;top:9px;right:9px;box-shadow:0 0 5px var(--green);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
  .rider-name{font-size:13px;font-weight:700;margin-bottom:3px;}
  .rider-bike{font-size:10px;color:var(--gray);margin-bottom:5px;}
  .rider-dist{font-size:11px;color:var(--orange);font-weight:700;}
  .msg-btn{margin-top:6px;width:100%;background:#2a2a2a;border:none;border-radius:6px;color:var(--blue);font-size:11px;font-family:'Noto Sans JP',sans-serif;padding:5px;cursor:pointer;}

  .leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--white)!important;border-radius:12px!important;border:1px solid var(--orange)!important;box-shadow:0 4px 20px rgba(255,106,0,.3)!important;}
  .leaflet-popup-tip{background:var(--card)!important;}
  .leaflet-popup-content{margin:12px 14px!important;}
  .popup-name{font-size:14px;font-weight:900;color:var(--orange);margin-bottom:4px;}
  .popup-info{font-size:11px;color:#aaa;line-height:1.7;}

  #chatScreen{background:var(--bg);}
  .chat-header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:1px solid #2a2a2a;flex-shrink:0;}
  .back-btn{background:none;border:none;color:var(--orange);font-size:22px;cursor:pointer;padding:0 4px;}
  .chat-header-info{flex:1;}
  .chat-header-name{font-size:16px;font-weight:700;}
  .chat-header-sub{font-size:11px;color:var(--gray);}
  .chat-tabs{display:flex;background:var(--surface);border-bottom:1px solid #2a2a2a;flex-shrink:0;}
  .chat-tab{flex:1;padding:12px;background:none;border:none;color:var(--gray);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;}
  .chat-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
  .messages-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;min-height:0;}
  .msg-wrap{display:flex;flex-direction:column;}
  .msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;}
  .msg-bubble.mine{background:var(--orange);color:#000;align-self:flex-end;border-bottom-right-radius:4px;font-weight:700;}
  .msg-bubble.theirs{background:#2a2a2a;color:var(--white);align-self:flex-start;border-bottom-left-radius:4px;}
  .msg-meta{font-size:10px;color:var(--gray);margin-top:3px;}
  .msg-meta.right{text-align:right;}
  .msg-sender{font-size:10px;color:var(--gray);margin-bottom:2px;}
  .chat-input-row{display:flex;gap:8px;padding:10px 16px 20px;background:var(--surface);border-top:1px solid #2a2a2a;flex-shrink:0;}
  .chat-input{flex:1;background:#2a2a2a;border:1px solid #333;border-radius:22px;padding:10px 16px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;}
  .chat-input:focus{border-color:var(--orange);}
  .send-btn{width:44px;height:44px;border-radius:50%;background:var(--orange);border:none;font-size:20px;cursor:pointer;flex-shrink:0;}
  .send-btn:disabled{opacity:.4;}
  .empty-msg{text-align:center;color:var(--gray);font-size:13px;padding:32px 16px;align-self:center;}

  .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--orange);color:#000;font-weight:700;font-size:13px;padding:8px 20px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:9999;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="screen active" id="setupScreen">
  <div class="setup-logo">RIDE<span>CONNECT</span></div>
  <div class="setup-sub">走りたい仲間を見つけよう</div>
  <div class="setup-form">
    <div><label>ニックネーム</label><input type="text" id="inputName" placeholder="例：カツキ" maxlength="10"></div>
    <div><label>バイク</label><input type="text" id="inputBike" placeholder="例：ニンジャ250" maxlength="20"></div>
    <button class="btn-start" onclick="startApp()">START RIDING 🏍️</button>
  </div>
</div>

<div class="screen" id="mainScreen">
  <div class="header">
    <div class="logo">RIDE<span>CONNECT</span></div>
    <div class="header-right">
      <div class="nearby-badge"><strong id="riderCount">0</strong>近くのライダー</div>
      <button class="chat-btn" onclick="openChat()">💬<div class="chat-badge" id="chatBadge"></div></button>
    </div>
  </div>
  <div id="map"></div>
  <div class="bottom-panel">
    <div class="status-row">
      <div class="status-label">
        <div class="title">ステータス</div>
        <div class="value" id="statusText">オフライン</div>
      </div>
      <button class="toggle-btn" id="toggleBtn" onclick="toggleStatus()"></button>
    </div>
    <div class="riders-title">近くのライダー</div>
    <div class="riders-scroll" id="riderList"></div>
  </div>
</div>

<div class="screen" id="chatScreen">
  <div class="chat-header">
    <button class="back-btn" onclick="closeChat()">←</button>
    <div class="chat-header-info">
      <div class="chat-header-name" id="chatTitle">みんなのチャット</div>
      <div class="chat-header-sub" id="chatSub">近くのライダーと話そう</div>
    </div>
  </div>
  <div class="chat-tabs">
    <button class="chat-tab active" id="tabGlobal" onclick="switchTab('global')">🌐 みんな</button>
    <button class="chat-tab" id="tabDirect" onclick="switchTab('direct')">👤 個別</button>
  </div>
  <div class="messages-list" id="messagesList"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="メッセージを入力..." maxlength="200">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCJ43W-7afDkW4IgA_bPBw42rsEELhC2Vc",
  authDomain:"rideconnect-dbcb8.firebaseapp.com",
  projectId:"rideconnect-dbcb8",
  storageBucket:"rideconnect-dbcb8.firebasestorage.app",
  messagingSenderId:"219375068042",
  appId:"1:219375068042:web:b00ec4e54dc8726d095e73"
});
const db=firebase.firestore();

let myId=localStorage.getItem('rcUid')||(Math.random().toString(36).slice(2)+Date.now().toString(36));
localStorage.setItem('rcUid',myId);
let myName='',myBike='',myLat=null,myLng=null,isActive=false;
let map=null,myMarker=null,riderMarkers={},riders={};
let watchId=null,currentTab='global',directTarget=null;
let unsubGlobal=null,unsubDirect=null,unsubRiders=null;
let unreadCount=0;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dist(a,b,c,d){const R=6371000,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2,m=R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';}
function fmt(ts){if(!ts)return '';const d=ts.toDate?ts.toDate():new Date();return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});}
function roomId(a,b){return [a,b].sort().join('_');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function startApp(){
  const n=document.getElementById('inputName').value.trim();
  const b=document.getElementById('inputBike').value.trim();
  if(!n||!b){toast('名前とバイクを入力してください');return;}
  myName=n;myBike=b;
  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
  initMap();listenRiders();listenGlobalChat();getLocation();
}

function initMap(){
  map=L.map('map',{zoomControl:false}).setView([35.6762,139.6503],14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);
  myMarker=L.circleMarker([35.6762,139.6503],{radius:10,color:'#ff6a00',fillColor:'#ff6a00',fillOpacity:0.3,weight:3}).addTo(map);
}

function getLocation(){
  if(!navigator.geolocation){toast('位置情報が使えません');return;}
  watchId=navigator.geolocation.watchPosition(pos=>{
    myLat=pos.coords.latitude;myLng=pos.coords.longitude;
    myMarker.setLatLng([myLat,myLng]);
    map.setView([myLat,myLng],14);
    if(isActive)saveLocation();
    renderCards();
  },{enableHighAccuracy:true,maximumAge:10000,timeout:20000});
}

function listenRiders(){
  unsubRiders=db.collection('riders').onSnapshot(snap=>{
    snap.docChanges().forEach(ch=>{
      const id=ch.doc.id,d=ch.doc.data();
      if(id===myId)return;
      if(ch.type==='removed'||!d.active){
        if(riderMarkers[id]){map.removeLayer(riderMarkers[id]);delete riderMarkers[id];}
        delete riders[id];
      } else {
        riders[id]=d;
        const icon=L.divIcon({html:`<div style="background:#ff6a00;border:2px solid #fff;border-radius:50%;width:14px;height:14px;box-shadow:0 0 8px rgba(255,106,0,.8)"></div>`,className:'',iconSize:[14,14],iconAnchor:[7,7]});
        if(riderMarkers[id])riderMarkers[id].setLatLng([d.lat,d.lng]);
        else{riderMarkers[id]=L.marker([d.lat,d.lng],{icon}).addTo(map).bindPopup(`<div class="popup-name">🏍️ ${esc(d.name)}</div><div class="popup-info">${esc(d.bike)}</div>`);riderMarkers[id].on('click',()=>openDirectChat(id,d.name,d.bike));}
      }
    });
    renderCards();
  });
}

function saveLocation(){
  if(!myLat||!myLng)return;
  db.collection('riders').doc(myId).set({name:myName,bike:myBike,lat:myLat,lng:myLng,active:true,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
}
function removeLocation(){db.collection('riders').doc(myId).delete();}

function toggleStatus(){
  isActive=!isActive;
  document.getElementById('toggleBtn').classList.toggle('on',isActive);
  const v=document.getElementById('statusText');
  v.textContent=isActive?'走りたい！':'オフライン';
  v.className='value'+(isActive?' active':'');
  myMarker.setStyle({color:isActive?'#39ff6a':'#ff6a00',fillColor:isActive?'#39ff6a':'#ff6a00'});
  toast(isActive?'🏍️ 走りたいモード ON！':'オフラインにしました');
  isActive?saveLocation():removeLocation();
}

function renderCards(){
  const list=document.getElementById('riderList');
  const es=Object.entries(riders).filter(([,d])=>d.active);
  document.getElementById('riderCount').textContent=es.length;
  if(!es.length){list.innerHTML=`<div style="color:var(--gray);font-size:12px;padding:8px 0">まだ近くにライダーがいません</div>`;return;}
  list.innerHTML=es.map(([id,d])=>`<div class="rider-card" onclick="focusRider('${id}')">
    <div class="rider-dot"></div>
    <div class="rider-name">${esc(d.name)}</div>
    <div class="rider-bike">${esc(d.bike)}</div>
    <div class="rider-dist">📍 ${myLat?dist(myLat,myLng,d.lat,d.lng):'--'}</div>
    <button class="msg-btn" onclick="event.stopPropagation();openDirectChat('${id}','${esc(d.name)}','${esc(d.bike)}')">💬 話しかける</button>
  </div>`).join('');
}

function focusRider(id){const d=riders[id];if(d)map.setView([d.lat,d.lng],15);}

function openChat(){
  unreadCount=0;document.getElementById('chatBadge').classList.remove('show');
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('chatScreen').classList.add('active');
  switchTab(currentTab);
}
function closeChat(){
  document.getElementById('chatScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
}
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabGlobal').classList.toggle('active',tab==='global');
  document.getElementById('tabDirect').classList.toggle('active',tab==='direct');
  if(tab==='global'){
    document.getElementById('chatTitle').textContent='みんなのチャット';
    document.getElementById('chatSub').textContent='近くのライダーと話そう';
    if(unsubDirect){unsubDirect();unsubDirect=null;}
    listenGlobalChat();
  }
}
function openDirectChat(tid,tname,tbike){
  directTarget={id:tid,name:tname,bike:tbike};
  currentTab='direct';
  document.getElementById('chatTitle').textContent=tname;
  document.getElementById('chatSub').textContent=tbike;
  document.getElementById('tabGlobal').classList.remove('active');
  document.getElementById('tabDirect').classList.add('active');
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('chatScreen').classList.add('active');
  if(unsubDirect){unsubDirect();unsubDirect=null;}
  unsubDirect=db.collection('directChat').doc(roomId(myId,tid)).collection('messages')
    .orderBy('createdAt').limitToLast(100).onSnapshot(snap=>renderMsgs(snap.docs.map(d=>({id:d.id,...d.data()}))));
}

function listenGlobalChat(){
  if(unsubGlobal)return;
  unsubGlobal=db.collection('globalChat').orderBy('createdAt').limitToLast(100).onSnapshot(snap=>{
    const open=document.getElementById('chatScreen').classList.contains('active')&&currentTab==='global';
    if(!open){
      if(snap.docChanges().some(c=>c.type==='added'&&c.doc.data().senderId!==myId)){
        unreadCount++;const b=document.getElementById('chatBadge');b.textContent=unreadCount>9?'9+':unreadCount;b.classList.add('show');
      }
      return;
    }
    renderMsgs(snap.docs.map(d=>({id:d.id,...d.data()})));
  });
}

function renderMsgs(msgs){
  const list=document.getElementById('messagesList');
  if(!msgs.length){list.innerHTML=`<div class="empty-msg">まだメッセージがありません<br>最初に話しかけてみよう！🏍️</div>`;return;}
  list.innerHTML=msgs.map(m=>{const mine=m.senderId===myId;return `<div class="msg-wrap">${!mine?`<div class="msg-sender">${esc(m.senderName||'')}</div>`:''}<div class="msg-bubble ${mine?'mine':'theirs'}">${esc(m.text)}</div><div class="msg-meta ${mine?'right':''}">${fmt(m.createdAt)}</div></div>`;}).join('');
  list.scrollTop=list.scrollHeight;
}

function sendMessage(){
  const input=document.getElementById('chatInput'),text=input.value.trim();
  if(!text)return;
  input.value='';
  document.getElementById('sendBtn').disabled=true;
  setTimeout(()=>document.getElementById('sendBtn').disabled=false,600);
  const data={text,senderId:myId,senderName:myName,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
  if(currentTab==='global')db.collection('globalChat').add(data);
  else if(directTarget)db.collection('directChat').doc(roomId(myId,directTarget.id)).collection('messages').add(data);
}

document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});
window.addEventListener('beforeunload',()=>{if(isActive)removeLocation();if(watchId)navigator.geolocation.clearWatch(watchId);});
</script>
</body>
</html>
