<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RideConnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0e0e0e;--surface:#1a1a1a;--card:#222;--orange:#ff6a00;--white:#f0ede8;--gray:#888;--green:#39ff6a;--red:#ff3b3b;--blue:#4da6ff;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--white);font-family:'Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;}
.screen{display:none;flex-direction:column;height:100%;}
.screen.active{display:flex;}

/* SETUP */
#setupScreen{background:linear-gradient(160deg,#1a0a00,#0e0e0e);align-items:center;justify-content:center;padding:28px 24px;gap:16px;overflow-y:auto;}
.setup-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:6px;color:var(--orange);line-height:1;text-align:center;}
.setup-logo span{color:var(--white);}
.setup-sub{font-size:13px;color:var(--gray);text-align:center;margin-top:-14px;}
.setup-form{width:100%;display:flex;flex-direction:column;gap:12px;}
.setup-form label{font-size:11px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;display:block;}
.setup-form input{width:100%;background:#2a2a2a;border:1px solid #333;border-radius:10px;padding:13px 16px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:16px;outline:none;transition:border-color .2s;}
.setup-form input:focus{border-color:var(--orange);}

/* バイク写真 */
.bike-photo-upload{width:100%;display:flex;flex-direction:column;gap:8px;}
.bike-photo-preview{width:100%;height:160px;border-radius:12px;background:#2a2a2a;border:2px dashed #444;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .2s;position:relative;}
.bike-photo-preview:active{border-color:var(--orange);}
.bike-photo-preview img{width:100%;height:100%;object-fit:cover;display:none;}
.bike-photo-preview.has-img img{display:block;}
.bike-photo-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--gray);}
.bike-photo-preview.has-img .bike-photo-placeholder{display:none;}
.bike-photo-placeholder span{font-size:32px;}
.bike-photo-placeholder p{font-size:12px;}
.bike-photo-change{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.7);color:var(--orange);font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;display:none;}
.bike-photo-preview.has-img .bike-photo-change{display:block;}
input[type=file]{display:none;}

/* 都道府県 */
.pref-section{width:100%;}
.pref-section-label{font-size:11px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block;}
.pref-selected-display{background:#2a2a2a;border:1px solid #333;border-radius:10px;padding:10px 14px;min-height:44px;margin-bottom:8px;font-size:13px;color:var(--white);line-height:1.8;}
.pref-selected-display.empty{color:var(--gray);}
.pref-toggle-btn{background:#2a2a2a;border:1px solid #444;border-radius:10px;padding:10px 16px;color:var(--orange);font-size:13px;font-family:'Noto Sans JP',sans-serif;font-weight:700;width:100%;cursor:pointer;text-align:left;}
.pref-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;flex-direction:column;}
.pref-modal.open{display:flex;}
.pref-modal-inner{background:var(--surface);border-radius:20px 20px 0 0;margin-top:auto;max-height:80vh;display:flex;flex-direction:column;}
.pref-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #2a2a2a;flex-shrink:0;}
.pref-modal-header h3{font-size:16px;font-weight:700;}
.pref-modal-done{background:var(--orange);color:#000;border:none;border-radius:20px;padding:8px 20px;font-weight:700;font-size:14px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.pref-list{overflow-y:auto;padding:12px 16px 24px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pref-check-item{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid #2f2f2f;border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .2s;}
.pref-check-item.checked{border-color:var(--orange);background:#1a0e00;}
.pref-check-box{width:18px;height:18px;border-radius:4px;border:2px solid #555;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
.pref-check-item.checked .pref-check-box{background:var(--orange);border-color:var(--orange);color:#000;}
.pref-check-label{font-size:13px;}

.btn-start{width:100%;background:var(--orange);color:#000;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;border:none;border-radius:12px;padding:15px;cursor:pointer;margin-top:4px;}
.btn-start:active{transform:scale(.97);}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;background:var(--bg);border-bottom:1px solid #2a2a2a;flex-shrink:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--orange);}
.logo span{color:var(--white);}
.header-right{display:flex;align-items:center;gap:10px;}
.nearby-badge{font-size:11px;color:var(--gray);text-align:right;line-height:1.3;}
.nearby-badge strong{display:block;font-size:20px;font-family:'Bebas Neue',sans-serif;color:var(--orange);}
.chat-btn{width:40px;height:40px;border-radius:50%;background:#2a2a2a;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;}
.chat-badge{position:absolute;top:0;right:0;width:16px;height:16px;background:var(--red);border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;}
.chat-badge.show{display:flex;}

/* REGION BANNER */
.region-banner{background:#1a1a1a;padding:8px 16px;border-bottom:1px solid #2a2a2a;font-size:12px;color:var(--gray);flex-shrink:0;}
.region-banner span{color:var(--orange);font-weight:700;}

/* RIDERS LIST */
.riders-container{flex:1;overflow-y:auto;padding:16px;}
.riders-area-title{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
.rider-item{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid #2f2f2f;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .2s;}
.rider-item:active{border-color:var(--orange);}
.rider-item-left{display:flex;align-items:center;gap:12px;}
.rider-avatar{width:48px;height:48px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;border:2px solid #333;}
.rider-avatar img{width:100%;height:100%;object-fit:cover;}
.rider-info .name{font-size:15px;font-weight:700;margin-bottom:3px;}
.rider-info .bike{font-size:12px;color:var(--gray);}
.rider-info .region{font-size:11px;color:var(--blue);margin-top:2px;}
.msg-btn-small{background:#2a2a2a;border:none;border-radius:8px;color:var(--blue);font-size:12px;font-family:'Noto Sans JP',sans-serif;padding:6px 12px;cursor:pointer;white-space:nowrap;}
.empty-riders{text-align:center;color:var(--gray);font-size:13px;padding:48px 16px;line-height:2;}

/* BOTTOM */
.bottom-panel{flex-shrink:0;background:var(--surface);border-top:1px solid #2f2f2f;padding:12px 16px 16px;z-index:100;}
.status-row{display:flex;align-items:center;justify-content:space-between;}
.status-label .title{font-size:11px;color:var(--gray);margin-bottom:2px;}
.status-label .value{font-size:15px;font-weight:900;color:var(--red);}
.status-label .value.active{color:var(--green);}
.toggle-btn{width:64px;height:34px;border-radius:17px;border:none;background:#333;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0;}
.toggle-btn.on{background:var(--orange);}
.toggle-btn::after{content:'';position:absolute;width:26px;height:26px;border-radius:50%;background:var(--white);top:4px;left:4px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 6px rgba(0,0,0,.4);}
.toggle-btn.on::after{transform:translateX(30px);}

/* CHAT */
#chatScreen{background:var(--bg);}
.chat-header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:1px solid #2a2a2a;flex-shrink:0;}
.back-btn{background:none;border:none;color:var(--orange);font-size:22px;cursor:pointer;padding:0 4px;}
.chat-header-avatar{width:36px;height:36px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;border:2px solid #444;}
.chat-header-avatar img{width:100%;height:100%;object-fit:cover;}
.chat-header-info{flex:1;}
.chat-header-name{font-size:16px;font-weight:700;}
.chat-header-sub{font-size:11px;color:var(--gray);}

/* メインタブ */
.chat-main-tabs{display:flex;background:var(--surface);border-bottom:1px solid #2a2a2a;flex-shrink:0;}
.chat-main-tab{flex:1;padding:11px;background:none;border:none;color:var(--gray);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;}
.chat-main-tab.active{color:var(--orange);border-bottom-color:var(--orange);}

/* 県タブ */
.pref-tabs-wrap{flex-shrink:0;background:#111;border-bottom:1px solid #2a2a2a;overflow-x:auto;scrollbar-width:none;}
.pref-tabs-wrap::-webkit-scrollbar{display:none;}
.pref-tabs{display:flex;padding:0 8px;white-space:nowrap;}
.pref-tab{flex-shrink:0;padding:9px 16px;background:none;border:none;color:var(--gray);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;}
.pref-tab.active{color:var(--orange);border-bottom-color:var(--orange);}

/* 個別ライダー一覧 */
.direct-riders-list{flex:1;overflow-y:auto;padding:16px;}
.direct-rider-item{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid #2f2f2f;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s;}
.direct-rider-item:active{border-color:var(--orange);}
.direct-rider-avatar{width:48px;height:48px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;border:2px solid #333;}
.direct-rider-avatar img{width:100%;height:100%;object-fit:cover;}
.direct-rider-info{flex:1;}
.direct-rider-info .name{font-size:15px;font-weight:700;margin-bottom:3px;}
.direct-rider-info .bike{font-size:12px;color:var(--gray);}
.direct-rider-info .region{font-size:11px;color:var(--blue);margin-top:2px;}

/* メッセージ */
.messages-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;min-height:0;}
.msg-wrap{display:flex;flex-direction:column;}

/* 送信者行（アイコン＋名前） */
.msg-sender-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.msg-sender-icon{width:24px;height:24px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;overflow:hidden;border:1px solid #444;}
.msg-sender-icon img{width:100%;height:100%;object-fit:cover;}
.msg-sender-name{font-size:11px;color:var(--gray);}

.msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg-bubble.mine{background:var(--orange);color:#000;align-self:flex-end;border-bottom-right-radius:4px;font-weight:700;}
.msg-bubble.theirs{background:#2a2a2a;color:var(--white);align-self:flex-start;border-bottom-left-radius:4px;}
.msg-meta{font-size:10px;color:var(--gray);margin-top:3px;}
.msg-meta.right{text-align:right;}

/* アクションメニュー（長押し） */
.msg-action-menu{position:fixed;background:var(--surface);border:1px solid #333;border-radius:16px;padding:8px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,0.6);min-width:180px;}
.msg-action-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;cursor:pointer;font-size:14px;transition:background .15s;}
.msg-action-item:active{background:#2a2a2a;}
.msg-action-item.dm{color:var(--blue);}
.msg-action-item.del{color:var(--red);}

.chat-input-row{display:flex;gap:8px;padding:10px 16px 20px;background:var(--surface);border-top:1px solid #2a2a2a;flex-shrink:0;}
.chat-input{flex:1;background:#2a2a2a;border:1px solid #333;border-radius:22px;padding:10px 16px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;resize:none;overflow-y:auto;line-height:1.4;}
.chat-input:focus{border-color:var(--orange);}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--orange);border:none;font-size:20px;cursor:pointer;flex-shrink:0;}
.send-btn:disabled{opacity:.4;}
.empty-msg{text-align:center;color:var(--gray);font-size:13px;padding:32px 16px;align-self:center;}

/* オーバーレイ（メニュー閉じる用） */
.menu-overlay{display:none;position:fixed;inset:0;z-index:499;}
.menu-overlay.show{display:block;}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--orange);color:#000;font-weight:700;font-size:13px;padding:8px 20px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen active" id="setupScreen">
  <div class="setup-logo">RIDE<span>CONNECT</span></div>
  <div class="setup-sub">走りたい仲間を見つけよう</div>
  <div class="setup-form">
    <div><label>ニックネーム</label><input type="text" id="inputName" placeholder="例：太郎" maxlength="10"></div>
    <div><label>バイク</label><input type="text" id="inputBike" placeholder="例：ZX-10R" maxlength="20"></div>
    <div class="bike-photo-upload">
      <label>バイクの写真（任意）</label>
      <div class="bike-photo-preview" id="bikePhotoPreview" onclick="document.getElementById('bikePhotoInput').click()">
        <div class="bike-photo-placeholder"><span>🏍️</span><p>タップして写真を追加</p></div>
        <img id="bikePhotoImg" src="" alt="バイク写真">
        <div class="bike-photo-change">写真を変更</div>
      </div>
      <input type="file" id="bikePhotoInput" accept="image/*" onchange="handlePhotoSelect(event)">
    </div>
    <div class="pref-section">
      <span class="pref-section-label">自分のエリア（必須）</span>
      <select id="inputPref" style="width:100%;background:#2a2a2a;border:1px solid #333;border-radius:10px;padding:13px 16px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:16px;outline:none;appearance:none;background-image:url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%278%27 viewBox=%270 0 12 8%27%3E%3Cpath d=%27M1 1l5 5 5-5%27 stroke=%27%23888%27 stroke-width=%272%27 fill=%27none%27/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 16px center;padding-right:40px;">
        <option value="">選択してください</option>
        <option>北海道</option><option>青森県</option><option>岩手県</option><option>宮城県</option><option>秋田県</option>
        <option>山形県</option><option>福島県</option><option>茨城県</option><option>栃木県</option><option>群馬県</option>
        <option>埼玉県</option><option>千葉県</option><option>東京都</option><option>神奈川県</option><option>新潟県</option>
        <option>富山県</option><option>石川県</option><option>福井県</option><option>山梨県</option><option>長野県</option>
        <option>岐阜県</option><option>静岡県</option><option>愛知県</option><option>三重県</option><option>滋賀県</option>
        <option>京都府</option><option>大阪府</option><option>兵庫県</option><option>奈良県</option><option>和歌山県</option>
        <option>鳥取県</option><option>島根県</option><option>岡山県</option><option>広島県</option><option>山口県</option>
        <option>徳島県</option><option>香川県</option><option>愛媛県</option><option>高知県</option><option>福岡県</option>
        <option>佐賀県</option><option>長崎県</option><option>熊本県</option><option>大分県</option><option>宮崎県</option>
        <option>鹿児島県</option><option>沖縄県</option>
      </select>
    </div>
    <div><label>市区町村（任意）</label><input type="text" id="inputCity" placeholder="例：上野" maxlength="20"></div>
    <div class="pref-section">
      <span class="pref-section-label">チャットで見たい県（複数選択可）</span>
      <div class="pref-selected-display empty" id="selectedPrefDisplay">未選択（自分のエリアのみ表示）</div>
      <button class="pref-toggle-btn" onclick="openPrefModal()">＋ 都道府県を選ぶ</button>
    </div>
    <button class="btn-start" onclick="startApp()">START RIDING 🏍️</button>
  </div>
</div>

<!-- 都道府県モーダル -->
<div class="pref-modal" id="prefModal">
  <div style="flex:1;" onclick="closePrefModal()"></div>
  <div class="pref-modal-inner">
    <div class="pref-modal-header">
      <h3>チャットで見たい県を選択</h3>
      <button class="pref-modal-done" onclick="closePrefModal()">完了</button>
    </div>
    <div class="pref-list" id="prefList"></div>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="mainScreen">
  <div class="header">
    <div class="logo">RIDE<span>CONNECT</span></div>
    <div class="header-right">
      <div class="nearby-badge"><strong id="riderCount">0</strong>近くのライダー</div>
      <button class="chat-btn" onclick="openChat()">💬<div class="chat-badge" id="chatBadge"></div></button>
    </div>
  </div>
  <div class="region-banner">エリア：<span id="regionLabel">-</span></div>
  <div class="riders-container">
    <div class="riders-area-title">同じエリアのライダー</div>
    <div id="riderList"></div>
  </div>
  <div class="bottom-panel">
    <div class="status-row">
      <div class="status-label">
        <div class="title">ステータス</div>
        <div class="value" id="statusText">オフライン</div>
      </div>
      <button class="toggle-btn" id="toggleBtn" onclick="toggleStatus()"></button>
    </div>
  </div>
</div>

<!-- CHAT -->
<div class="screen" id="chatScreen">
  <div class="chat-header">
    <button class="back-btn" onclick="closeChat()">←</button>
    <div class="chat-header-avatar" id="chatHeaderAvatar">💬</div>
    <div class="chat-header-info">
      <div class="chat-header-name" id="chatTitle">チャット</div>
      <div class="chat-header-sub" id="chatSub">ライダーと話そう</div>
    </div>
  </div>
  <div class="chat-main-tabs">
    <button class="chat-main-tab active" id="tabArea" onclick="switchMainTab('area')">🌐 エリア</button>
    <button class="chat-main-tab" id="tabDirect" onclick="switchMainTab('direct')">👤 個別</button>
  </div>
  <div class="pref-tabs-wrap" id="prefTabsWrap">
    <div class="pref-tabs" id="prefTabs"></div>
  </div>
  <div class="messages-list" id="messagesList"></div>
  <div class="direct-riders-list" id="directRidersList" style="display:none;"></div>
  <div class="chat-input-row" id="chatInputRow">
    <textarea class="chat-input" id="chatInput" placeholder="メッセージを入力..." maxlength="200" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- 長押しメニュー -->
<div class="menu-overlay" id="menuOverlay" onclick="closeActionMenu()"></div>
<div class="msg-action-menu" id="msgActionMenu" style="display:none;">
  <div class="msg-action-item dm" id="actionDM" onclick="doActionDM()">💬 個別にメッセージを送る</div>
  <div class="msg-action-item del" id="actionDelete" style="display:none;" onclick="doActionDelete()">🗑️ メッセージを削除</div>
</div>

<div class="toast" id="toast"></div>

<script>
const PREFS=['北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県','茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県','新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県','静岡県','愛知県','三重県','滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県','鳥取県','島根県','岡山県','広島県','山口県','徳島県','香川県','愛媛県','高知県','福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県'];

firebase.initializeApp({
  apiKey:"AIzaSyCJ43W-7afDkW4IgA_bPBw42rsEELhC2Vc",
  authDomain:"rideconnect-dbcb8.firebaseapp.com",
  projectId:"rideconnect-dbcb8",
  storageBucket:"rideconnect-dbcb8.firebasestorage.app",
  messagingSenderId:"219375068042",
  appId:"1:219375068042:web:b00ec4e54dc8726d095e73"
});
const db=firebase.firestore();

let myId=localStorage.getItem('rcUid')||(Math.random().toString(36).slice(2)+Date.now().toString(36));
localStorage.setItem('rcUid',myId);
db.collection("riders").doc(myId).delete().catch(()=>{});

let myName='',myBike='',myPref='',myCity='',myPhoto='';
let selectedPrefs=[];
let isActive=false;
let riders={};
let currentMainTab='area',currentPref='',directTarget=null;
let unsubRiders=null,unsubDirect=null;
let prefUnsubs={},prefMsgsCache={};
let unreadCount=0,holdTimer=null;

// 長押しメニュー用
let actionTarget=null; // {msgId, senderId, senderName, senderBike, senderPhoto, type}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(ts){if(!ts)return '';const d=ts.toDate?ts.toDate():new Date();return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});}
function roomId(a,b){return [a,b].sort().join('_');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

/* ── 写真 ── */
function handlePhotoSelect(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=400;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=h*MAX/w;w=MAX;}}else{if(h>MAX){w=w*MAX/h;h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      myPhoto=canvas.toDataURL('image/jpeg',0.7);
      document.getElementById('bikePhotoImg').src=myPhoto;
      document.getElementById('bikePhotoPreview').classList.add('has-img');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── 都道府県モーダル ── */
function buildPrefModal(){
  document.getElementById('prefList').innerHTML=PREFS.map(p=>`
    <div class="pref-check-item" id="pci_${p}" onclick="togglePrefCheck('${p}')">
      <div class="pref-check-box" id="pcb_${p}"></div>
      <span class="pref-check-label">${p}</span>
    </div>`).join('');
}
function togglePrefCheck(pref){
  const idx=selectedPrefs.indexOf(pref);
  if(idx>=0)selectedPrefs.splice(idx,1);else selectedPrefs.push(pref);
  updatePrefCheckUI();updateSelectedDisplay();
}
function updatePrefCheckUI(){
  PREFS.forEach(p=>{
    const item=document.getElementById('pci_'+p),box=document.getElementById('pcb_'+p);
    if(!item)return;
    const c=selectedPrefs.includes(p);
    item.classList.toggle('checked',c);box.textContent=c?'✓':'';
  });
}
function updateSelectedDisplay(){
  const el=document.getElementById('selectedPrefDisplay');
  if(!selectedPrefs.length){el.textContent='未選択（自分のエリアのみ表示）';el.classList.add('empty');}
  else{el.textContent=selectedPrefs.join('　');el.classList.remove('empty');}
}
function openPrefModal(){document.getElementById('prefModal').classList.add('open');updatePrefCheckUI();}
function closePrefModal(){document.getElementById('prefModal').classList.remove('open');updateSelectedDisplay();}

/* ── 起動 ── */
function startApp(){
  const n=document.getElementById('inputName').value.trim();
  const b=document.getElementById('inputBike').value.trim();
  const p=document.getElementById('inputPref').value;
  const c=document.getElementById('inputCity').value.trim();
  if(!n||!b||!p){toast('名前・バイク・都道府県を入力してください');return;}
  myName=n;myBike=b;myPref=p;myCity=c;
  if(!selectedPrefs.includes(p))selectedPrefs.unshift(p);
  localStorage.setItem('rcName',n);localStorage.setItem('rcBike',b);
  localStorage.setItem('rcPref',p);localStorage.setItem('rcCity',c);
  localStorage.setItem('rcSelectedPrefs',JSON.stringify(selectedPrefs));
  if(myPhoto)localStorage.setItem('rcPhoto',myPhoto);
  document.getElementById('regionLabel').textContent=c?p+' '+c:p;
  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
  listenRiders();
  selectedPrefs.forEach(pref=>listenAreaChat(pref));
  buildPrefTabs();currentPref=myPref;
}

window.addEventListener('load',()=>{
  buildPrefModal();
  const n=localStorage.getItem('rcName'),b=localStorage.getItem('rcBike');
  const p=localStorage.getItem('rcPref'),c=localStorage.getItem('rcCity');
  const sp=localStorage.getItem('rcSelectedPrefs'),ph=localStorage.getItem('rcPhoto');
  if(n)document.getElementById('inputName').value=n;
  if(b)document.getElementById('inputBike').value=b;
  if(p)document.getElementById('inputPref').value=p;
  if(c)document.getElementById('inputCity').value=c;
  if(sp){selectedPrefs=JSON.parse(sp);updateSelectedDisplay();}
  if(ph){myPhoto=ph;document.getElementById('bikePhotoImg').src=ph;document.getElementById('bikePhotoPreview').classList.add('has-img');}
});

/* ── ライダー一覧 ── */
function listenRiders(){
  if(unsubRiders){unsubRiders();unsubRiders=null;}
  unsubRiders=db.collection('riders').where('pref','==',myPref).where('active','==',true)
    .onSnapshot(snap=>{
      riders={};
      snap.docs.forEach(d=>{if(d.id!==myId)riders[d.id]=d.data();});
      renderCards();
      if(currentMainTab==='direct')renderDirectRidersList();
    });
}
function saveLocation(){
  db.collection('riders').doc(myId).set({
    name:myName,bike:myBike,pref:myPref,city:myCity,
    photo:myPhoto||'',active:true,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  });
}
function removeLocation(){db.collection('riders').doc(myId).delete();}
function toggleStatus(){
  isActive=!isActive;
  document.getElementById('toggleBtn').classList.toggle('on',isActive);
  const v=document.getElementById('statusText');
  v.textContent=isActive?'走りたい！':'オフライン';
  v.className='value'+(isActive?' active':'');
  toast(isActive?'🏍️ 走りたいモード ON！':'オフラインにしました');
  isActive?saveLocation():removeLocation();
}

function avatarEl(photo,fallback,cls){
  const div=document.createElement('div');div.className=cls;
  if(photo){const img=document.createElement('img');img.src=photo;img.alt='';div.appendChild(img);}
  else div.textContent=fallback;
  return div.outerHTML;
}

function renderCards(){
  const list=document.getElementById('riderList');
  const entries=Object.entries(riders);
  document.getElementById('riderCount').textContent=entries.length;
  if(!entries.length){
    list.innerHTML=`<div class="empty-riders">🏍️<br>${myPref}にまだライダーがいません<br><br>「走りたい！」をONにして<br>仲間を待ちましょう！</div>`;return;
  }
  list.innerHTML=entries.map(([id,d])=>`
    <div class="rider-item" onclick="openDirectChat('${id}','${esc(d.name)}','${esc(d.bike)}','${esc(d.photo||'')}')">
      <div class="rider-item-left">
        ${avatarEl(d.photo,'🏍️','rider-avatar')}
        <div class="rider-info">
          <div class="name">${esc(d.name)}</div>
          <div class="bike">${esc(d.bike)}</div>
          <div class="region">📍 ${esc(d.pref)}${d.city?' '+esc(d.city):''}</div>
        </div>
      </div>
      <button class="msg-btn-small" onclick="event.stopPropagation();openDirectChat('${id}','${esc(d.name)}','${esc(d.bike)}','${esc(d.photo||'')}')">💬 話す</button>
    </div>`).join('');
}

function renderDirectRidersList(){
  const list=document.getElementById('directRidersList');
  const entries=Object.entries(riders);
  if(!entries.length){
    list.innerHTML=`<div class="empty-msg">🏍️ ${myPref}に走りたいライダーがいません</div>`;return;
  }
  list.innerHTML=entries.map(([id,d])=>`
    <div class="direct-rider-item" onclick="openDirectChat('${id}','${esc(d.name)}','${esc(d.bike)}','${esc(d.photo||'')}')">
      ${avatarEl(d.photo,'🏍️','direct-rider-avatar')}
      <div class="direct-rider-info">
        <div class="name">${esc(d.name)}</div>
        <div class="bike">${esc(d.bike)}</div>
        <div class="region">📍 ${esc(d.pref)}${d.city?' '+esc(d.city):''}</div>
      </div>
      <span style="color:var(--gray);font-size:18px;">›</span>
    </div>`).join('');
}

/* ── 県タブ ── */
function buildPrefTabs(){
  document.getElementById('prefTabs').innerHTML=selectedPrefs.map(p=>`
    <button class="pref-tab ${p===currentPref?'active':''}" id="ptab_${p}" onclick="switchPrefTab('${p}')">${p}</button>`).join('');
}

function listenAreaChat(pref){
  if(prefUnsubs[pref])return;
  prefUnsubs[pref]=db.collection('areaChat').doc('area_'+pref).collection('messages')
    .orderBy('createdAt').limitToLast(200)
    .onSnapshot(snap=>{
      const msgs=snap.docs.map(d=>({id:d.id,...d.data()}));
      prefMsgsCache[pref]=msgs;
      const isViewing=document.getElementById('chatScreen').classList.contains('active')
        &&currentMainTab==='area'&&currentPref===pref;
      if(!isViewing&&snap.docChanges().some(c=>c.type==='added'&&c.doc.data().senderId!==myId)){
        unreadCount++;
        const b=document.getElementById('chatBadge');
        b.textContent=unreadCount>9?'9+':unreadCount;b.classList.add('show');
      }
      if(isViewing)renderMsgs(msgs,'area');
    });
}

function openChat(){
  unreadCount=0;document.getElementById('chatBadge').classList.remove('show');
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('chatScreen').classList.add('active');
  switchMainTab('area');
}
function closeChat(){
  document.getElementById('chatScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
}

function switchMainTab(tab){
  currentMainTab=tab;
  document.getElementById('tabArea').classList.toggle('active',tab==='area');
  document.getElementById('tabDirect').classList.toggle('active',tab==='direct');
  if(tab==='area'){
    document.getElementById('prefTabsWrap').style.display='block';
    document.getElementById('messagesList').style.display='flex';
    document.getElementById('directRidersList').style.display='none';
    document.getElementById('chatInputRow').style.display='flex';
    switchPrefTab(currentPref||myPref);
  } else {
    document.getElementById('prefTabsWrap').style.display='none';
    document.getElementById('messagesList').style.display='none';
    document.getElementById('directRidersList').style.display='block';
    document.getElementById('chatInputRow').style.display='none';
    document.getElementById('chatTitle').textContent='個別チャット';
    document.getElementById('chatSub').textContent='話しかけたいライダーを選ぼう';
    const av=document.getElementById('chatHeaderAvatar');
    av.innerHTML='👤';av.style.background='transparent';
    renderDirectRidersList();
  }
}

function switchPrefTab(pref){
  currentPref=pref;
  selectedPrefs.forEach(p=>{const el=document.getElementById('ptab_'+p);if(el)el.classList.toggle('active',p===pref);});
  document.getElementById('chatTitle').textContent=pref+'のチャット';
  document.getElementById('chatSub').textContent='長押しで個別メッセージも送れます';
  const av=document.getElementById('chatHeaderAvatar');av.innerHTML='🌐';av.style.background='transparent';
  const cached=prefMsgsCache[pref]||[];
  if(cached.length)renderMsgs(cached,'area');
  else document.getElementById('messagesList').innerHTML=`<div class="empty-msg">まだメッセージがありません<br>最初に話しかけてみよう！🏍️</div>`;
  const activeTab=document.getElementById('ptab_'+pref);
  if(activeTab)activeTab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function openDirectChat(tid,tname,tbike,tphoto){
  directTarget={id:tid,name:tname,bike:tbike,photo:tphoto};
  currentMainTab='direct';
  const av=document.getElementById('chatHeaderAvatar');
  if(tphoto){av.innerHTML=`<img src="${tphoto}" alt="">`;av.style.background='none';}
  else{av.innerHTML='🏍️';av.style.background='var(--orange)';}
  document.getElementById('chatTitle').textContent=tname;
  document.getElementById('chatSub').textContent=tbike;
  document.getElementById('tabArea').classList.remove('active');
  document.getElementById('tabDirect').classList.add('active');
  document.getElementById('prefTabsWrap').style.display='none';
  document.getElementById('messagesList').style.display='flex';
  document.getElementById('directRidersList').style.display='none';
  document.getElementById('chatInputRow').style.display='flex';
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('chatScreen').classList.add('active');
  if(unsubDirect){unsubDirect();unsubDirect=null;}
  unsubDirect=db.collection('directChat').doc(roomId(myId,tid)).collection('messages')
    .orderBy('createdAt').limitToLast(100)
    .onSnapshot(snap=>renderMsgs(snap.docs.map(d=>({id:d.id,...d.data()})),'direct'));
}

/* ── メッセージ描画 ── */
function renderMsgs(msgs,type){
  const list=document.getElementById('messagesList');
  if(!msgs.length){
    list.innerHTML=`<div class="empty-msg">まだメッセージがありません<br>最初に話しかけてみよう！🏍️</div>`;return;
  }

  // senderIdからriderデータを引く（エリアチャット用）
  list.innerHTML=msgs.map(m=>{
    const mine=m.senderId===myId;
    const riderData=riders[m.senderId]||null;
    const senderPhoto=riderData?.photo||'';

    if(mine){
      // 自分のメッセージ：長押しで削除
      return `<div class="msg-wrap">
        <div class="msg-bubble mine"
          ontouchstart="startHoldOwn('${m.id}','${type}',event)" ontouchend="cancelHold()"
          onmousedown="startHoldOwn('${m.id}','${type}',event)" onmouseup="cancelHold()"
        >${esc(m.text)}</div>
        <div class="msg-meta right">${fmt(m.createdAt)} ✕長押し削除</div>
      </div>`;
    } else {
      // 相手のメッセージ：アイコン＋名前＋長押しでDMメニュー
      const iconHtml=senderPhoto
        ?`<div class="msg-sender-icon"><img src="${senderPhoto}" alt=""></div>`
        :`<div class="msg-sender-icon">🏍️</div>`;
      return `<div class="msg-wrap">
        <div class="msg-sender-row">
          ${iconHtml}
          <span class="msg-sender-name">${esc(m.senderName||'')}</span>
        </div>
        <div class="msg-bubble theirs"
          ontouchstart="startHoldOther('${m.id}','${esc(m.senderId)}','${esc(m.senderName||'')}','${esc(riderData?.bike||'')}','${esc(senderPhoto)}','${type}',event)" ontouchend="cancelHold()"
          onmousedown="startHoldOther('${m.id}','${esc(m.senderId)}','${esc(m.senderName||'')}','${esc(riderData?.bike||'')}','${esc(senderPhoto)}','${type}',event)" onmouseup="cancelHold()"
        >${esc(m.text)}</div>
        <div class="msg-meta">${fmt(m.createdAt)}</div>
      </div>`;
    }
  }).join('');
  list.scrollTop=list.scrollHeight;
}

/* ── 長押しメニュー ── */
let holdTimer2=null;

function startHoldOwn(msgId,type,e){
  holdTimer2=setTimeout(()=>{
    actionTarget={msgId,type,isMine:true};
    document.getElementById('actionDM').style.display='none';
    document.getElementById('actionDelete').style.display='flex';
    showActionMenu(e);
  },600);
}

function startHoldOther(msgId,senderId,senderName,senderBike,senderPhoto,type,e){
  holdTimer2=setTimeout(()=>{
    actionTarget={msgId,senderId,senderName,senderBike,senderPhoto,type,isMine:false};
    document.getElementById('actionDM').style.display='flex';
    document.getElementById('actionDelete').style.display='none';
    showActionMenu(e);
  },600);
}

function cancelHold(){clearTimeout(holdTimer2);}

function showActionMenu(e){
  const menu=document.getElementById('msgActionMenu');
  const overlay=document.getElementById('menuOverlay');
  menu.style.display='block';
  overlay.classList.add('show');
  // タッチ位置に表示
  const touch=e.touches?e.touches[0]:e;
  const x=Math.min(touch.clientX,window.innerWidth-200);
  const y=Math.min(touch.clientY,window.innerHeight-120);
  menu.style.left=x+'px';menu.style.top=y+'px';
}

function closeActionMenu(){
  document.getElementById('msgActionMenu').style.display='none';
  document.getElementById('menuOverlay').classList.remove('show');
  actionTarget=null;
}

function doActionDM(){
  if(!actionTarget)return;
  closeActionMenu();
  openDirectChat(actionTarget.senderId,actionTarget.senderName,actionTarget.senderBike,actionTarget.senderPhoto);
}

function doActionDelete(){
  if(!actionTarget)return;
  closeActionMenu();
  if(!confirm('このメッセージを削除しますか？'))return;
  if(actionTarget.type==='area'){
    db.collection('areaChat').doc('area_'+currentPref).collection('messages').doc(actionTarget.msgId).delete();
  } else if(directTarget){
    db.collection('directChat').doc(roomId(myId,directTarget.id)).collection('messages').doc(actionTarget.msgId).delete();
  }
}

function sendMessage(){
  const input=document.getElementById('chatInput'),text=input.value.trim();
  if(!text)return;
  input.value='';input.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  setTimeout(()=>document.getElementById('sendBtn').disabled=false,600);
  const data={text,senderId:myId,senderName:myName,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
  if(currentMainTab==='area'){
    db.collection('areaChat').doc('area_'+currentPref).collection('messages').add(data);
  } else if(directTarget){
    db.collection('directChat').doc(roomId(myId,directTarget.id)).collection('messages').add(data);
  }
}

document.getElementById('chatInput').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});
window.addEventListener('beforeunload',()=>{if(isActive)removeLocation();});
</script>
